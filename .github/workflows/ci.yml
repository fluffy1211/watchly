name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: watchly_test
          MYSQL_USER: watchly
          MYSQL_PASSWORD: watchly
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, intl, zip
          coverage: none

      - name: Install dependencies
        working-directory: ./backend
        run: composer install --no-progress --no-interaction

      - name: Generate JWT keys
        working-directory: ./backend
        run: |
          mkdir -p config/jwt
          openssl genpkey -out config/jwt/private.pem \
            -aes256 -algorithm rsa -pkeyopt rsa_keygen_bits:4096 \
            -pass pass:watchly_jwt_passphrase
          openssl pkey -in config/jwt/private.pem \
            -out config/jwt/public.pem -pubout \
            -passin pass:watchly_jwt_passphrase

      - name: Create test database schema
        working-directory: ./backend
        env:
          DATABASE_URL: mysql://watchly:watchly@127.0.0.1:3306/watchly_test
          APP_ENV: test
          JWT_SECRET_KEY: config/jwt/private.pem
          JWT_PUBLIC_KEY: config/jwt/public.pem
          JWT_PASSPHRASE: watchly_jwt_passphrase
          TMDB_API_KEY: fake_key_for_tests
        run: |
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run PHPUnit tests
        working-directory: ./backend
        env:
          DATABASE_URL: mysql://watchly:watchly@127.0.0.1:3306/watchly_test
          APP_ENV: test
          JWT_SECRET_KEY: config/jwt/private.pem
          JWT_PUBLIC_KEY: config/jwt/public.pem
          JWT_PASSPHRASE: watchly_jwt_passphrase
          TMDB_API_KEY: fake_key_for_tests
        run: php bin/phpunit

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
