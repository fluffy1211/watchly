services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: watchly
      MYSQL_USER: watchly
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
    ports:
      - "3307:3306"
    volumes:
      - watchly_db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=dev
      - DATABASE_URL=${DATABASE_URL:-mysql://watchly:changeme@db:3306/watchly?serverVersion=8.0&charset=utf8mb4}
      - JWT_SECRET_KEY=/var/www/html/config/jwt/private.pem
      - JWT_PUBLIC_KEY=/var/www/html/config/jwt/public.pem
      - JWT_PASSPHRASE=${JWT_PASSPHRASE:-watchly_jwt_passphrase}
    volumes:
      - ./backend:/var/www/html

  front:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  watchly_db_data:
